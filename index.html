<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King's Gardens — Staff Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#2d6a4f;--green-mid:#52b788;--green-pale:#d8f3dc;
  --amber:#e9c46a;--amber-dark:#856404;
  --red:#c0392b;--red-pale:#fce8ea;
  --blue:#1d6e8a;--blue-pale:#e8f4f8;
  --text:#1a2e22;--text-mid:#4a6555;--text-muted:#8aab96;
  --border:#cde0d4;--surface:#f7fbf8;--white:#ffffff;
  --font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
}
html,body{font-family:var(--font);background:var(--surface);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
