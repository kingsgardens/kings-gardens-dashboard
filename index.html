<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King's Gardens — Staff Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#2d6a4f;--green-mid:#52b788;--green-pale:#d8f3dc;
  --amber:#e9c46a;--amber-dark:#856404;
  --red:#c0392b;--red-pale:#fce8ea;
  --blue:#1d6e8a;--blue-pale:#e8f4f8;
  --text:#1a2e22;--text-mid:#4a6555;--text-muted:#8aab96;
  --border:#cde0d4;--surface:#f7fbf8;--white:#ffffff;
  --font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
}
html,body{font-family:var(--font);background:var(--surface);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* HEADER */
.header{background:var(--white);border-bottom:1.5px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:12px}
.logo-mark{width:40px;height:40px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.header-title{font-size:20px;font-weight:600;letter-spacing:-.3px}
.header-sub{font-size:12px;color:var(--text-muted)}
.clock{font-family:var(--mono);font-size:24px;font-weight:500;color:var(--green);letter-spacing:1px}
.date-line{font-size:12px;color:var(--text-mid);margin-top:1px;text-align:right}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:16px 20px;max-width:1600px;margin:0 auto}
.span2{grid-column:span 2}
.span3{grid-column:span 3}

/* CARD */
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:0 1px 4px rgba(30,60,40,.06)}
.card-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;margin-bottom:12px;border-bottom:1px solid var(--border)}
.card-title{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted)}
.badge{font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px;white-space:nowrap}
.badge-live{background:var(--green-pale);color:var(--green)}
.badge-blue{background:var(--blue-pale);color:var(--blue)}
.badge-red{background:var(--red-pale);color:var(--red)}

/* INPUTS */
input,textarea,select{font-family:var(--font);font-size:13px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:6px 10px;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--green-mid)}
button{font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;border:none;border-radius:7px;padding:7px 14px;transition:opacity .15s}
button:hover{opacity:.85}
.btn-green{background:var(--green);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-ghost{background:var(--green-pale);color:var(--green)}

/* ALERT CARD */
@keyframes alertPulse{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,0)}50%{box-shadow:0 0 0 12px rgba(192,57,43,.2)}}
.alert-card{grid-column:span 3;border-radius:14px;overflow:hidden}
.alert-card.pulse{animation:alertPulse 2.5s ease-in-out infinite}
.alert-top{padding:16px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.alert-top-left{display:flex;align-items:center;gap:14px}
.alert-icon-big{font-size:36px;line-height:1;flex-shrink:0}
.alert-event{font-size:22px;font-weight:700;color:#fff;letter-spacing:.4px;line-height:1.2}
.alert-source{font-size:12px;color:rgba(255,255,255,.65);margin-top:4px}
.alert-low-pill{border-radius:10px;padding:10px 20px;text-align:center;flex-shrink:0;background:rgba(0,0,0,.25)}
.alert-low-label{font-size:10px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.8px}
.alert-low-temp{font-size:32px;font-weight:300;color:#fff;line-height:1.15}
.alert-body{padding:0 22px 18px}
.alert-divider{height:1px;background:rgba(255,255,255,.12);margin-bottom:14px}
.alert-headline{font-size:15px;font-weight:500;color:rgba(255,255,255,.94);line-height:1.55;margin-bottom:8px}
.alert-desc{font-size:12px;color:rgba(255,255,255,.62);line-height:1.7;margin-bottom:14px}
.alert-tags{display:flex;gap:8px;flex-wrap:wrap}
.alert-tag{background:rgba(255,255,255,.13);color:rgba(255,255,255,.88);border-radius:20px;padding:4px 13px;font-size:11px;font-weight:600}

/* COMMENT CARD */
.comment-card{grid-column:span 3;background:var(--white);border:2px solid #e8b4b8;border-radius:14px;padding:16px 18px;box-shadow:0 1px 6px rgba(192,57,43,.08)}
.comment-list{display:flex;flex-direction:column;gap:7px;margin-bottom:12px;max-height:200px;overflow-y:auto}
.comment-item{border-left:3px solid var(--green-mid);border-radius:0 8px 8px 0;background:var(--surface);padding:8px 12px}
.comment-meta{font-size:11px;color:var(--text-muted);margin-bottom:3px}
.comment-body{font-size:13px;color:var(--text);line-height:1.55}
.comment-input-row{display:flex;gap:8px;align-items:flex-end;margin-top:8px}
.comment-input-row textarea{flex:1;min-height:56px;resize:none}or:var(--text-muted);margin-top:5px;min-height:16px}

/* MESSAGE */
.msg-body{background:var(--surface);border-radius:8px;padding:10px 12px;font-size:14px;line-height:1.65;min-height:56px;white-space:pre-wrap;margin-bottom:10px}
.msg-edit{display:flex;gap:8px;align-items:flex-start}
.msg-edit textarea{flex:1;min-height:60px;resize:vertical}
.msg-ts{font-size:10px;color:var(--text-muted)}

/* CALENDAR */
.cal-wrap{display:flex;gap:16px}
.cal-left{flex-shrink:0}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-nav-btn{width:24px;height:24px;border:1px solid var(--border);background:var(--surface);border-radius:6px;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text-mid);padding:0;cursor:pointer}
.cal-nav-btn:hover{background:var(--green-pale)}
.cal-month-lbl{font-size:13px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,28px);gap:2px}
.cal-dow{font-size:9px;font-weight:700;text-align:center;color:var(--text-muted);text-transform:uppercase;padding:2px 0}
.cal-day{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-mid);cursor:pointer;position:relative;user-select:none}
.cal-day:hover{background:var(--green-pale)}
.cal-day.today{background:var(--green);color:#fff;font-weight:700}
.cal-day.selected:not(.today){background:var(--green-pale);color:var(--green);font-weight:600}
.cal-day.has-event::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--amber)}
.cal-day.today.has-event::after{background:rgba(255,255,255,.8)}
.cal-right{flex:1;display:flex;flex-direction:column}
.cal-date-lbl{font-size:13px;font-weight:600;margin-bottom:8px}
.event-list{flex:1;display:flex;flex-direction:column;gap:5px;margin-bottom:8px;max-height:150px;overflow-y:auto}
.event-item{display:flex;align-items:center;gap:8px;background:var(--surface);border-radius:7px;padding:6px 9px;font-size:12px}
.ev-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-delivery{background:var(--blue)}
.dot-vendor{background:var(--amber)}
.dot-misc{background:var(--green-mid)}
.ev-name{font-weight:500;flex:1}
.ev-time{font-size:11px;color:var(--text-muted)}
.ev-del{cursor:pointer;color:var(--text-muted);font-size:13px;padding:0 2px}
.ev-del:hover{color:var(--red)}
.event-add{display:flex;gap:5px;flex-wrap:wrap}
.event-add input,.event-add select{font-size:12px;padding:5px 8px}
.event-add .ev-name-in{flex:1;min-width:90px}
.event-add .ev-time-in{width:76px}
.event-add select{width:110px}

/* GDD CARD */
.gdd-hero{display:flex;align-items:flex-end;gap:6px;margin-bottom:14px}
.gdd-number{font-size:52px;font-weight:300;line-height:1;letter-spacing:-2px;color:var(--text)}
.gdd-unit{font-size:16px;color:var(--text-muted);margin-bottom:8px}
.gdd-label{font-size:12px;color:var(--text-muted);margin-bottom:8px;padding-left:2px}
.gdd-bases{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.gdd-base-btn{padding:6px 0;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);transition:all .15s;text-align:center}
.gdd-base-btn.active{border-color:var(--green-mid);background:var(--green-pale);color:var(--green)}
.gdd-base-btn:hover:not(.active){background:var(--green-pale);color:var(--green)}
.gdd-bar-wrap{margin-bottom:12px}
.gdd-bar-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.gdd-bar-track{height:8px;background:var(--surface);border-radius:20px;border:1px solid var(--border);overflow:hidden}
.gdd-bar-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--green-mid),var(--green));transition:width .6s ease}
.gdd-milestones{display:flex;flex-direction:column;gap:5px}
.gdd-milestone{display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 8px;border-radius:7px;background:var(--surface)}
.gdd-ms-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gdd-ms-name{flex:1;color:var(--text-mid)}
.gdd-ms-val{color:var(--text-muted);font-size:11px}
.gdd-ms-reached{background:var(--green-pale)}
.gdd-ms-reached .gdd-ms-name{color:var(--green);font-weight:500}
.gdd-ms-reached .gdd-ms-dot{background:var(--green-mid)}
.gdd-ms-dot-pending{background:var(--border)}
.gdd-reset-row{display:flex;gap:8px;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.gdd-reset-row label{font-size:11px;color:var(--text-muted);white-space:nowrap}

/* IRRIGATION CARD */
.irr-key-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.irr-key-row label{font-size:11px;color:var(--text-muted);white-space:nowrap;width:52px;flex-shrink:0}
.irr-key-row input{flex:1;font-size:12px;padding:5px 8px}
.irr-zones{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.irr-zone{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:var(--surface);font-size:12px}
.irr-zone.active{background:#e8f4e8;border:1px solid var(--green-mid)}
.irr-zone-num{width:22px;height:22px;border-radius:50%;background:var(--border);color:var(--text-muted);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.irr-zone.active .irr-zone-num{background:var(--green-mid);color:#fff}
.irr-zone-name{flex:1;font-weight:500;color:var(--text)}
.irr-zone-next{font-size:11px;color:var(--text-muted);text-align:right}
.irr-zone-next.running{color:var(--green);font-weight:600}
.irr-controller{font-size:11px;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.irr-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0}
.irr-dot.online{background:var(--green-mid)}

/* LOGIN OVERLAY */
#loginOverlay{position:fixed;inset:0;background:var(--surface);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:36px 40px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(30,60,40,.10)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.login-logo-mark{width:48px;height:48px;background:var(--green);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.login-title{font-size:22px;font-weight:600;letter-spacing:-.3px}
.login-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.login-tabs{display:flex;gap:0;margin-bottom:24px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.login-tab{flex:1;padding:8px 0;text-align:center;font-size:13px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--text-muted);border:none;transition:all .15s}
.login-tab.active{background:var(--green);color:#fff}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.login-field input{width:100%;padding:9px 12px;font-size:14px}
.login-btn{width:100%;padding:11px;font-size:14px;font-weight:600;border-radius:9px;margin-top:6px}
.login-msg{font-size:12px;margin-top:10px;text-align:center;min-height:18px;line-height:1.5}
.login-msg.err{color:var(--red)}
.login-msg.ok{color:var(--green)}

/* ADMIN PANEL */
.admin-panel{background:var(--surface);border-radius:10px;padding:14px;margin-top:12px}
.admin-panel h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:10px}
.pending-user{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--white);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:12px}
.pending-user-name{flex:1;font-weight:500}
.pending-user-date{font-size:11px;color:var(--text-muted);margin-right:4px}
.btn-approve{background:var(--green-pale);color:var(--green);border:none;border-radius:6px;padd
